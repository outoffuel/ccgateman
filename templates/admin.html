<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GateMan - 管理者用ダッシュボード</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-title">
                <div class="logo-symbol">G</div>
                <h1>GateMan 管理ダッシュボード</h1>
            </div>
            <div class="status-badge">
                <span class="status-dot"></span>
                <span id="system-status">システム稼働中</span>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-info">
                    <h3>登録ユーザー総数</h3>
                    <div class="stat-value" id="stat-users">0</div>
                </div>
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <h3>本日の打刻数</h3>
                    <div class="stat-value" id="stat-today-logs">0</div>
                </div>
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <h3>現在の在室者数</h3>
                    <div class="stat-value" id="stat-active-users">0</div>
                </div>
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </div>
            </div>
        </div>

        <!-- Dashboard Layout -->
        <div class="dashboard-content">
            <!-- Left Side controls -->
            <div class="panel-col">
                <!-- Registration Form -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                            新規ユーザー利用登録
                        </div>
                    </div>
                    <div class="card-body">
                        <form id="reg-form" onsubmit="registerUser(event)">
                            <div class="form-group">
                                <label for="reg-card-id">磁気ID *</label>
                                <input type="text" id="reg-card-id" class="form-control" placeholder="例: 12345678" required>
                            </div>
                            <div class="form-group">
                                <label for="reg-student-id">学籍番号 *</label>
                                <input type="text" id="reg-student-id" class="form-control" placeholder="例: S26001" required>
                            </div>
                            <div class="form-group">
                                <label for="reg-name">氏名 *</label>
                                <input type="text" id="reg-name" class="form-control" placeholder="例: 山田 太郎" required>
                            </div>
                            <div class="form-group">
                                <label for="reg-attribute">属性 *</label>
                                <select id="reg-attr-code" class="form-control" required>
                                    <option value="1">学生</option>
                                    <option value="9">学生スタッフ</option>
                                    <option value="0">教職員</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="reg-department">学部学科 / 所属</label>
                                <input type="text" id="reg-department" class="form-control" placeholder="例: 工学部情報工学科">
                            </div>
                            <div class="form-group">
                                <label for="reg-furigana">フリガナ</label>
                                <input type="text" id="reg-furigana" class="form-control" placeholder="例: ヤマダ タロウ">
                            </div>
                            <div class="form-group">
                                <label for="reg-gender">性別</label>
                                <select id="reg-gender" class="form-control">
                                    <option value="">--</option>
                                    <option value="男">男</option>
                                    <option value="女">女</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="reg-purpose">利用目的</label>
                                <input type="text" id="reg-purpose" class="form-control" placeholder="例: 研究、授業、実験補助">
                            </div>
                            <div class="form-group">
                                <label for="reg-phone">電話番号</label>
                                <input type="tel" id="reg-phone" class="form-control" placeholder="例: 080-1234-5678">
                            </div>
                            <button type="submit" class="btn btn-primary">
                                登録する
                            </button>
                        </form>
                    </div>
                </div>

                <!-- System Controls -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                            システム管理
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="btn-group">
                            <a href="/api/export" class="btn btn-success" style="text-decoration:none;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                ログをExcelでエクスポート
                            </a>
                            <button class="btn btn-secondary" onclick="reloadMasterCache()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                                マスタ再読み込み (Excel同期)
                            </button>
                            <button class="btn btn-secondary" onclick="toggleAdvanced()" style="border-color: rgba(196,112,0,0.3); color: var(--warning);">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3m0 12l-4-4m4 4l4-4M2 17l.621 2.485A2 2 0 0 0 4.561 21h14.878a2 2 0 0 0 1.94-1.515L22 17M3 10h18"/></svg>
                                高度操作
                            </button>
                        </div>
                        <div id="advanced-panel" style="display:none; margin-top:1rem; padding-top:1rem; border-top:1px solid var(--glass-border);">
                            <div style="font-size:0.85rem; color:var(--text-muted); margin-bottom:0.8rem; font-weight:600;">年度更新</div>
                            <button class="btn btn-secondary" onclick="confirmYearRollover()" style="border-color: rgba(210,33,45,0.3); color: var(--danger);">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                次年度準備（エクスポート & 新シート作成）
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side panels -->
            <div class="panel-col" style="flex:1;">
                <!-- Registered Users List -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                            登録メンバー一覧
                        </div>
                        <span style="font-size: 0.8rem; color: var(--text-muted);" id="user-count-lbl">0件登録</span>
                    </div>
                    <div class="card-body">
                        <div class="search-bar">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input type="text" id="search-users-input" class="form-control" placeholder="学籍番号、氏名、学部等でフィルタ..." oninput="filterUsersTable()">
                        </div>
                        
                        <div class="table-responsive scrollable-box">
                            <table class="data-table" id="users-table">
                                <thead>
                                    <tr>
                                        <th>磁気ID</th>
                                        <th>学籍番号</th>
                                        <th>氏名</th>
                                        <th>フリガナ</th>
                                        <th>属性</th>
                                        <th>学部学科 / 所属</th>
                                        <th>性別</th>
                                        <th>利用目的</th>
                                        <th>電話番号</th>
                                    </tr>
                                </thead>
                                <tbody id="users-list-body">
                                    <tr>
                                        <td colspan="9" style="text-align: center; color: var(--text-muted);">読み込み中...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Recent Logs -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            最近の入退室履歴 (直近50件)
                        </div>
                        <button class="btn btn-secondary" onclick="loadRecentLogs()" style="width:auto; padding:0.4rem 0.8rem; font-size:0.8rem;">
                            更新
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive scrollable-box">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>学籍番号</th>
                                        <th>氏名</th>
                                        <th>種別</th>
                                        <th>時刻</th>
                                        <th>滞在時間</th>
                                    </tr>
                                </thead>
                                <tbody id="logs-list-body">
                                    <tr>
                                        <td colspan="5" style="text-align: center; color: var(--text-muted);">履歴はありません</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast" id="toast-el">
        <div class="toast-icon" id="toast-icon">✓</div>
        <div id="toast-text">通知メッセージ</div>
    </div>

    <script>
        // Global variables
        let registeredUsers = [];

        // Show Toast Utility
        function showToast(message, isSuccess = true) {
            const toast = document.getElementById('toast-el');
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');

            toast.className = isSuccess ? 'toast show toast-success' : 'toast show toast-error';
            toastIcon.textContent = isSuccess ? '✓' : '✕';
            toastText.textContent = message;

            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // Fetch registered users list from API
        function loadUsers() {
            fetch('/api/users')
                .then(response => response.json())
                .then(data => {
                    registeredUsers = data || [];
                    renderUsersTable(registeredUsers);
                    
                    // Update stats
                    document.getElementById('stat-users').textContent = registeredUsers.length;
                    document.getElementById('user-count-lbl').textContent = `${registeredUsers.length}件登録`;
                })
                .catch(error => {
                    console.error('Error loading users:', error);
                    showToast('ユーザー情報の取得に失敗しました。', false);
                });
        }

        // Render Users Table
        function renderUsersTable(users) {
            const tbody = document.getElementById('users-list-body');
            if (users.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" style="text-align: center; color: var(--text-muted);">登録ユーザーはいません</td></tr>`;
                return;
            }

            tbody.innerHTML = users.map((user, idx) => `
                <tr>
                    <td><code>${escapeHtml(user.CardID)}</code></td>
                    <td>${escapeHtml(user.StudentID)}</td>
                    <td style="font-weight: 600;">${escapeHtml(user.Name)}</td>
                    <td>${escapeHtml(user.Furigana || '-')}</td>
                    <td><span class="badge badge-role">${escapeHtml(user.Attribute)}</span></td>
                    <td>${escapeHtml(user.Department || '-')}</td>
                    <td>${escapeHtml(user.Gender || '-')}</td>
                    <td>${escapeHtml(user.Purpose || '-')}</td>
                    <td><span class="phone-reveal" onclick="togglePhone(this, ${idx})" data-phone="${escapeHtml(user.Phone || '')}">表示</span></td>
                </tr>
            `).join('');
        }

        function togglePhone(el, idx) {
            const phone = el.getAttribute('data-phone');
            if (!phone) {
                el.textContent = '-';
                return;
            }
            if (el.classList.contains('revealed')) {
                el.textContent = '表示';
                el.classList.remove('revealed');
            } else {
                el.textContent = phone;
                el.classList.add('revealed');
                el.style.cursor = 'pointer';
            }
        }

        // Filter Users Table
        function filterUsersTable() {
            const query = document.getElementById('search-users-input').value.toLowerCase().trim();
            if (!query) {
                renderUsersTable(registeredUsers);
                return;
            }

            const filtered = registeredUsers.filter(u => 
                u.CardID.toLowerCase().includes(query) ||
                u.StudentID.toLowerCase().includes(query) ||
                u.Name.toLowerCase().includes(query) ||
                u.Attribute.toLowerCase().includes(query) ||
                (u.Department && u.Department.toLowerCase().includes(query)) ||
                (u.Furigana && u.Furigana.toLowerCase().includes(query)) ||
                (u.Gender && u.Gender.toLowerCase().includes(query)) ||
                (u.Purpose && u.Purpose.toLowerCase().includes(query))
            );
            renderUsersTable(filtered);
        }

        // Fetch recent logs list from API
        function loadRecentLogs() {
            fetch('/api/logs')
                .then(response => response.json())
                .then(data => {
                    renderLogsTable(data.logs || []);
                    
                    // Update stats
                    document.getElementById('stat-today-logs').textContent = data.todayLogsCount || 0;
                    document.getElementById('stat-active-users').textContent = data.activeUsersCount || 0;
                })
                .catch(error => {
                    console.error('Error loading logs:', error);
                    showToast('履歴ログの取得に失敗しました。', false);
                });
        }

        // Render Logs Table
        function renderLogsTable(logs) {
            const tbody = document.getElementById('logs-list-body');
            if (logs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">履歴はありません</td></tr>`;
                return;
            }

            tbody.innerHTML = logs.map(log => {
                let statusBadge = '';
                if (log.Status === '退室' || log.Status === '強制退室') {
                    statusBadge = '<span class="badge badge-exit">退室済</span>';
                } else {
                    statusBadge = '<span class="badge badge-enter">入室中</span>';
                }

                return `
                    <tr>
                        <td>${escapeHtml(log.StudentID)}</td>
                        <td style="font-weight: 600;">${escapeHtml(log.Name)}</td>
                        <td>${statusBadge}</td>
                        <td>${log.Timestamp ? formatDateString(log.Timestamp) : '<span style="color:var(--text-muted);">-</span>'}</td>
                        <td>${log.Status === '入室' ? '<span style="color:var(--text-muted); font-style:italic;">滞在中</span>' : '<span style="color:var(--text-muted);">-</span>'}</td>
                    </tr>
                `;
            }).join('');
        }

        // Helper to format dates cleanly
        function formatDateString(str) {
            if (!str) return '-';
            // Output format: YYYY-MM-DD HH:mm:ss -> MM/DD HH:mm
            try {
                const parts = str.split(' ');
                if (parts.length >= 2) {
                    const dateParts = parts[0].split('-');
                    const timeParts = parts[1].split(':');
                    return `${dateParts[1]}/${dateParts[2]} ${timeParts[0]}:${timeParts[1]}`;
                }
            } catch (e) {}
            return str;
        }

        // Register new user form handler
        function registerUser(event) {
            event.preventDefault();
            
            const cardID = document.getElementById('reg-card-id').value.trim();
            const studentID = document.getElementById('reg-student-id').value.trim();
            const name = document.getElementById('reg-name').value.trim();
            const attrCode = document.getElementById('reg-attr-code').value;
            const department = document.getElementById('reg-department').value.trim();
            const furigana = document.getElementById('reg-furigana').value.trim();
            const gender = document.getElementById('reg-gender').value;
            const purpose = document.getElementById('reg-purpose').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();

            const formData = new FormData();
            formData.append('card_id', cardID);
            formData.append('student_id', studentID);
            formData.append('name', name);
            formData.append('attr_code', attrCode);
            formData.append('department', department);
            formData.append('furigana', furigana);
            formData.append('gender', gender);
            formData.append('purpose', purpose);
            formData.append('phone', phone);

            fetch('/api/users', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showToast('新規ユーザー登録が成功しました。');
                    document.getElementById('reg-form').reset();
                    loadUsers();
                } else {
                    showToast('登録エラー: ' + data.message, false);
                }
            })
            .catch(error => {
                console.error('Error registering:', error);
                showToast('サーバー通信エラーが発生しました。', false);
            });
        }

        // Reload Master Cache from NAS File
        function reloadMasterCache() {
            fetch('/api/users/reload', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showToast(`マスタを再読込しました。(${data.count} 名のデータをロード)`);
                    loadUsers();
                } else {
                    showToast('読み込みエラー: ' + data.message, false);
                }
            })
            .catch(error => {
                console.error('Error reloading:', error);
                showToast('サーバー通信エラーが発生しました。', false);
            });
        }

        // Toggle advanced operations panel
        function toggleAdvanced() {
            const panel = document.getElementById('advanced-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        // Confirm and execute year rollover
        function confirmYearRollover() {
            if (!confirm('現在の年度の登録者データをアーカイブし、新年度シートを作成します。よろしいですか？')) {
                return;
            }

            const btn = document.querySelector('#advanced-panel .btn');
            btn.disabled = true;
            btn.textContent = '処理中...';

            fetch('/api/year/rollover', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showToast(data.message.replace('\\n', ' / '), true);
                        loadUsers();
                    } else {
                        showToast('エラー: ' + data.message, false);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showToast('サーバー通信エラーが発生しました。', false);
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = '次年度準備（エクスポート & 新シート作成）';
                });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        // Initial Data Load
        window.addEventListener('DOMContentLoaded', () => {
            loadUsers();
            loadRecentLogs();
            // Auto refresh logs every 10 seconds
            setInterval(loadRecentLogs, 10000);
        });
    </script>
</body>
</html>
