<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GateMan - 入退室打刻システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.95); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        .animate-fade-out { animation: fadeOut 0.3s ease-in forwards; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 0.8s linear infinite; }
        #card-input:focus { outline: none; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-amber-50 to-stone-100 flex flex-col items-center justify-center p-4 sm:p-8">

    <div class="w-full max-w-md mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl font-bold text-stone-700 tracking-tight">GateMan</h1>
            <p class="text-stone-400 text-sm mt-1">入退室打刻システム</p>
        </div>

        <div class="bg-white/70 backdrop-blur-lg rounded-2xl shadow-xl border border-stone-200/60 p-6 sm:p-8">
            <div class="mb-6 text-center">
                <div class="text-4xl font-light text-stone-400 mb-2" id="clock">--:--:--</div>
                <div class="text-sm text-stone-400" id="clock-date">----</div>
            </div>

            <div class="relative">
                <input
                    type="text"
                    id="card-input"
                    autofocus
                    autocomplete="off"
                    placeholder="カードIDをスキャン / 入力"
                    class="w-full text-center text-xl sm:text-2xl py-4 px-4 rounded-xl border-2 border-stone-200 bg-white/80 text-stone-700 placeholder-stone-300 transition-all duration-200 focus:border-blue-400 focus:ring-4 focus:ring-blue-100 disabled:opacity-50 disabled:cursor-not-allowed"
                    disabled
                >
                <div id="loading-indicator" class="hidden absolute right-4 top-1/2 -translate-y-1/2">
                    <svg class="animate-spin h-6 w-6 text-blue-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </div>
            </div>

            <p class="text-center text-stone-400 text-sm mt-3" id="hint-text">カードをリーダーにかざすか、IDを入力してEnterキーを押してください</p>
        </div>

        <p class="text-center text-stone-300 text-xs mt-6">GateMan v2.0</p>
    </div>

    <div id="result-overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/20 backdrop-blur-sm">
        <div id="result-card" class="animate-fade-in w-full max-w-sm rounded-2xl shadow-2xl border p-6 sm:p-8 text-center bg-white">
            <div id="result-icon" class="w-16 h-16 mx-auto mb-4 rounded-full flex items-center justify-center text-3xl"></div>
            <div id="result-title" class="text-xl font-bold text-stone-700 mb-1"></div>
            <div id="result-message" class="text-sm text-stone-500 mb-4"></div>
            <div id="result-details" class="hidden bg-stone-50 rounded-xl p-4 text-left text-sm space-y-2 border border-stone-100">
                <div class="flex justify-between"><span class="text-stone-400">学籍番号</span><span class="font-medium text-stone-600" id="res-sid">-</span></div>
                <div class="flex justify-between"><span class="text-stone-400">区分</span><span class="font-medium text-stone-600" id="res-attr">-</span></div>
                <div class="flex justify-between"><span class="text-stone-400">打刻時刻</span><span class="font-medium text-stone-600" id="res-time">-</span></div>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('card-input');
        const loading = document.getElementById('loading-indicator');
        const hint = document.getElementById('hint-text');
        const overlay = document.getElementById('result-overlay');
        const resultCard = document.getElementById('result-card');
        const resultIcon = document.getElementById('result-icon');
        const resultTitle = document.getElementById('result-title');
        const resultMsg = document.getElementById('result-message');
        const resultDetails = document.getElementById('result-details');
        const resSid = document.getElementById('res-sid');
        const resAttr = document.getElementById('res-attr');
        const resTime = document.getElementById('res-time');

        let isProcessing = false;
        let dismissTimer = null;

        function updateClock() {
            const n = new Date();
            document.getElementById('clock').textContent =
                String(n.getHours()).padStart(2,'0') + ':' +
                String(n.getMinutes()).padStart(2,'0') + ':' +
                String(n.getSeconds()).padStart(2,'0');
            const days = ['日','月','火','水','木','金','土'];
            document.getElementById('clock-date').textContent =
                n.getFullYear() + '年' + (n.getMonth()+1) + '月' + n.getDate() + '日 ' + days[n.getDay()] + '曜日';
        }
        setInterval(updateClock, 1000);
        updateClock();

        function enableInput() {
            input.disabled = false;
            loading.classList.add('hidden');
            hint.textContent = 'カードをリーダーにかざすか、IDを入力してEnterキーを押してください';
            input.focus();
        }

        function disableInput() {
            input.disabled = true;
            loading.classList.remove('hidden');
            hint.textContent = '処理中...';
        }

        function showResult(data) {
            const isOk = data.success;
            const stay = data.stay_duration ? '（滞在時間: ' + data.stay_duration + '）' : '';
            const msg = data.message || (isOk ? '打刻が完了しました。' : 'エラーが発生しました。');

            if (isOk) {
                resultCard.className = 'animate-fade-in w-full max-w-sm rounded-2xl shadow-2xl border p-6 sm:p-8 text-center bg-white border-emerald-200';
                resultIcon.className = 'w-16 h-16 mx-auto mb-4 rounded-full flex items-center justify-center text-3xl bg-emerald-100 text-emerald-600';
                resultIcon.textContent = '✓';
                resultTitle.textContent = data.status === '退室' ? '退室完了' : '入室完了';
                resultTitle.className = 'text-xl font-bold text-emerald-700 mb-1';
                if (data.student_id) {
                    resultDetails.classList.remove('hidden');
                    resSid.textContent = data.student_id;
                    resAttr.textContent = data.attr_label || '-';
                    resTime.textContent = data.timestamp || '-';
                } else {
                    resultDetails.classList.add('hidden');
                }
            } else {
                resultCard.className = 'animate-fade-in w-full max-w-sm rounded-2xl shadow-2xl border p-6 sm:p-8 text-center bg-white border-red-200';
                resultIcon.className = 'w-16 h-16 mx-auto mb-4 rounded-full flex items-center justify-center text-3xl bg-red-100 text-red-600';
                resultIcon.textContent = '✕';
                resultTitle.textContent = 'エラー';
                resultTitle.className = 'text-xl font-bold text-red-700 mb-1';
                resultDetails.classList.add('hidden');
            }
            resultMsg.textContent = msg;
            overlay.classList.remove('hidden');
            isProcessing = false;

            if (dismissTimer) clearTimeout(dismissTimer);
            dismissTimer = setTimeout(dismissResult, 5000);
        }

        function dismissResult() {
            resultCard.className = resultCard.className.replace('animate-fade-in', 'animate-fade-out');
            setTimeout(() => {
                overlay.classList.add('hidden');
                resultCard.className = resultCard.className.replace('animate-fade-out', 'animate-fade-in');
                enableInput();
            }, 300);
        }

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                if (dismissTimer) clearTimeout(dismissTimer);
                dismissResult();
            }
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (isProcessing) return;
                const val = input.value.trim();
                if (!val) return;
                isProcessing = true;
                disableInput();
                processScan(val);
            }
        });

        function processScan(cardID) {
            const formData = new FormData();
            formData.append('card_id', cardID);

            input.value = '';

            fetch('/api/scan', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    showResult(data);
                })
                .catch(err => {
                    console.error('Scan error:', err);
                    isProcessing = false;
                    showResult({ success: false, message: 'サーバー通信エラーが発生しました。' });
                });
        }

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                input.disabled = false;
                input.focus();
            }, 300);
        });

        document.addEventListener('click', () => {
            if (!input.disabled && overlay.classList.contains('hidden')) {
                input.focus();
            }
        });
    </script>
</body>
</html>
